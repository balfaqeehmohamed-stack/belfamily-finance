<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <g clip-path="url(#roundedSquare)">
    <rect x="0" y="0" width="512" height="512" fill="#FFFFFF"/>

    <!-- Left circle (Mohamed) -->
    <circle cx="210" cy="256" r="120" fill="url(#blueGrad)" opacity="0.85"/>

    <!-- Right circle (Fatima) -->
    <circle cx="302" cy="256" r="120" fill="url(#blueGrad)" opacity="0.85"/>

    <!-- Diamond shape in the overlap center (growing wealth) -->
    <polygon points="256,196 296,256 256,316 216,256" fill="#FFFFFF" opacity="0.95"/>
  </g>
</svg>
